feature: 2026-07-14-legacy-config-snapshot
created: 2026-07-14

steps:
  - action: "基线inventory：用git rev-parse写legacy-pre-head.txt，用固定ls-remote参数写legacy-origin-before.tsv，并分类tracked/untracked/ignored"
    exit_signal: "两个before证据已命名落盘；每个路径有结论，运行时有效的ignored源码/旧lock标记为强制纳入"
    status: done
  - action: "Snapshot commit：stage 并提交替换前全部有效状态"
    exit_signal: "snapshot commit 可读取，pre-snapshot HEAD 是其祖先，staged diff 无遗漏"
    status: pending
  - action: "Legacy tag：创建指向 snapshot commit 的 annotated tag"
    exit_signal: "legacy-nvim-config-2026-07-14 的 object type 为 tag，peeled target 等于 snapshot commit"
    status: pending
  - action: "恢复验证：核对tag tree、PRE_HEAD/origin祖先，并保存origin-after后与before逐字比较"
    exit_signal: "用户修改和全部本地历史可从tag读取，且真实origin refs前后一致"
    status: pending

checks:
  - item: "legacy snapshot 是完整包含旧 runtime/worktree 的命名恢复基线"
    source: 名词契约
    status: pending
  - item: "tag 冲突时 fail-closed，不自动移动现有 tag"
    source: 流程级约束
    status: pending
  - item: "Git master history 新增 snapshot commit"
    source: 挂载点
    status: pending
  - item: "Git refs 新增 annotated legacy tag"
    source: 挂载点
    status: pending
  - item: "不执行历史重写、远端推送或文件系统备份"
    source: 范围守护
    status: pending
  - item: "snapshot 包含用户修改、本地提交、有效 ignored 源码/lock 和 CodeStable 状态"
    source: 验收场景
    status: pending
  - item: "origin refs 在 feature 前后保持一致"
    source: 验收场景
    status: pending

dod:
  commands:
    - id: CMD-001
      command: "git status --short --branch && git ls-files --others --ignored --exclude-standard"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "git cat-file -t legacy-nvim-config-2026-07-14"
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "git rev-parse legacy-nvim-config-2026-07-14^{}"
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "git merge-base --is-ancestor origin/master legacy-nvim-config-2026-07-14^{}"
      core: true
      failure_handling: fix-or-block
    - id: CMD-005
      command: "git ls-remote origin refs/heads/master refs/tags/legacy-nvim-config-2026-07-14"
      core: true
      failure_handling: fix-or-block
    - id: CMD-006
      command: "git cat-file -e legacy-nvim-config-2026-07-14:lua/custom/debug/init.lua && git cat-file -e legacy-nvim-config-2026-07-14:lazy-lock.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-007
      command: "git merge-base --is-ancestor \"$(cat .tests/evidence/legacy-pre-head.txt)\" \"$(git rev-parse 'legacy-nvim-config-2026-07-14^{}')\""
      core: true
      failure_handling: fix-or-block
    - id: CMD-008
      command: "git ls-remote origin refs/heads/master refs/tags/legacy-nvim-config-2026-07-14 > .tests/evidence/legacy-origin-after.tsv && cmp .tests/evidence/legacy-origin-before.tsv .tests/evidence/legacy-origin-after.tsv"
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, diff_summary, git_objects, pre_head, remote_refs_before_after]
  cleanliness:
    debug_output: forbidden
