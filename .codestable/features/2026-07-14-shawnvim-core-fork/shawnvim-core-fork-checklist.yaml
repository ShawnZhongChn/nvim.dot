dod:
  commands:
    - id: CMD-001
      command: "nvim -l tests/minit.lua --minitest"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "scripts/audit-identity --json .tests/evidence/core-identity.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "scripts/audit-source-manifest --source-cache .tests/upstream/lazyvim-source --fetch-missing --core . --manifest UPSTREAM-SOURCE.json --json .tests/evidence/core-source.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "nvim -l scripts/check-lua-syntax.lua"
      core: true
      failure_handling: fix-or-block
    - id: CMD-005
      command: "stylua --check lua tests"
      core: false
      failure_handling: document-baseline
    - id: CMD-006
      command: "selene lua tests"
      core: false
      failure_handling: document-baseline
  evidence_required: [command_output, diff_summary, manifest, resolved_specs, minit_json, notice_audit, source_cache_identity, audit_json, supporting_tool_preflight]
  cleanliness:
    debug_output: forbidden
