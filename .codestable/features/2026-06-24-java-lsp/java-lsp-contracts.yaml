feature: 2026-06-24-java-lsp
created: 2026-06-24
contracts:
  - contract_id: java-profile
    module: lua/custom/lang/java.lua
    parallelizable_with: [java-format-policy]
    inputs:
      - name: filetype
        type: str
        required: true
        description: Neovim buffer filetype, expected to be java
    outputs:
      - name: profile
        type: dict
        nullable: false
        description: Java workflow profile with jdtls and formatting policy metadata
    error_semantics:
      - code: unsupported_filetype
        when: filetype is not java
        recovery: language registry leaves the buffer on the default path
    ownership: custom.lang
    test_probe: "lua/custom/lang/init.lua maps java to java profile and java.lua returns lsp_servers containing jdtls"
    status: frozen
    notes: "No DAP or test adapter integration in this feature"

  - contract_id: jdtls-server-registration
    module: lua/custom/lsp/registry.lua
    parallelizable_with: [java-format-policy]
    inputs:
      - name: project_root_markers
        type: list
        required: true
        description: Java root markers with pom.xml as the Maven project signal
    outputs:
      - name: server_config
        type: dict
        nullable: false
        description: jdtls server config merged with Java root detection and capabilities
    error_semantics:
      - code: root_not_found
        when: no Java root marker is found for the buffer
        recovery: fall back to the current file directory when safe, without affecting non-Java buffers
    ownership: custom.lsp
    test_probe: "registry.servers().jdtls exists and its root_dir can resolve a pom.xml project root"
    status: frozen
    notes: "Mason package for jdtls must be included in ensure_installed"

  - contract_id: java-enhancement-settings
    module: lua/custom/lsp/server_settings/jdtls.lua
    parallelizable_with: [java-format-policy]
    inputs:
      - name: root_dir
        type: str
        required: false
        description: Java project root used to build workspace and initialization options
      - name: java_home
        type: str
        required: false
        description: JAVA_HOME or auto-discovered JDK path when available
    outputs:
      - name: jdtls_settings
        type: dict
        nullable: false
        description: jdtls settings covering Maven import, Spring/Lombok support hooks, runtimes and formatting preferences
    error_semantics:
      - code: missing_jdk
        when: no usable JDK is found or installed
        recovery: notify the user and allow Mason/tool installer path to provide required tools where possible
      - code: missing_lombok
        when: Lombok agent jar is unavailable
        recovery: start jdtls without crashing and notify that Lombok-generated members may be incomplete
    ownership: custom.lsp
    test_probe: "jdtls settings module loads successfully and exposes Java configuration without throwing when JAVA_HOME or lombok jar is absent; scripts/setup_java_sdkman.sh provides the opt-in JDK/Maven install path"
    status: frozen
    notes: "Spring enhancement is configured through jdtls Java settings and optional Spring Boot tools package if available; JDK/Maven installation is guided through SDKMAN rather than run automatically by Neovim"

  - contract_id: java-format-policy
    module: lua/custom/format/registry.lua
    parallelizable_with: [java-profile, jdtls-server-registration, java-enhancement-settings]
    inputs:
      - name: filetype
        type: str
        required: true
        description: Neovim buffer filetype, expected to be java
    outputs:
      - name: format_policy
        type: dict
        nullable: false
        description: Java formatting policy compatible with existing conform format-on-save behavior
    error_semantics:
      - code: formatter_unavailable
        when: dedicated Java formatter is not installed or not executable
        recovery: use LSP fallback rather than failing the save operation
    ownership: custom.format
    test_probe: "registry.resolve() for a java buffer returns Java-specific formatter settings with lsp fallback"
    status: frozen
    notes: "Must not change existing non-Java formatter resolution"
