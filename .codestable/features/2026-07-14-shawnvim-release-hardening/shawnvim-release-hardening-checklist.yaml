feature: 2026-07-14-shawnvim-release-hardening
created: 2026-07-14

steps:
  - action: "Test/CI orchestration：整合scripts/test、ignored evidence、license audit与独立v0.11.2/stable workflow"
    exit_signal: "单一本地命令运行全部核心gates；ci.yml固定job id=test、name模板、matrix key/value、action完整SHA且无cache"
    status: pending
  - action: "Release payload/docs：完成 README、CONTRIBUTING、license/provenance 与 release-ready metadata"
    exit_signal: "公开说明与最终 tree一致，文档转载边界和Apache源码范围通过audit"
    status: pending
  - action: "Candidate freeze：对完整候选tree执行独立review/QA与本地全量gate，创建immutable candidate commit"
    exit_signal: "reports/evidence对应同一候选tree，candidate OID已记录且working tree无payload漂移"
    status: pending
  - action: "Candidate publish/CI：写candidate/refs approval report并获owner批准；fetch no-tags验证fast-forward，按精确OID非强制push，push后再fetch并等待exact-SHA matrix"
    exit_signal: "approval approved，origin/master等于candidate；该head_sha唯一push run的固定名v0.11.2/stable jobs均success"
    status: pending
  - action: "Tags publish：创建同candidate SHA的annotated v0.1.0，逐ref push legacy/release tags并核对object/peeled OIDs"
    exit_signal: "两个remote tag-object/peeled OID分别与本地一致，tag message正确且Release API返回404"
    status: pending
  - action: "Admin closure：写acceptance/PublishEvidence与approval history，完成两个roadmaps，创建仅改.codestable的admin commit，从HEAD推导OID并在push前后fetch"
    exit_signal: "origin/master等于推导的ADMIN_OID，candidate是其祖先，tracked evidence无self-OID，tags保持targets且admin无payload改动"
    status: pending

checks:
  - item: "LocalTestEvidence、tracked PublishEvidence、post-admin ignored FinalConvergenceEvidence分离，tracked文件不嵌入自身admin/final branch OID"
    source: 名词契约
    status: pending
  - item: "scripts/test 是 local/CI 共用公开验证入口"
    source: 名词契约
    status: pending
  - item: "local gate/review/QA → candidate commit/push → exact-SHA CI → tags → admin closure 顺序固定"
    source: 编排骨架
    status: pending
  - item: "fetch后的ancestry/equality与tag-object/peeled冲突均fail-closed，禁止force update"
    source: 流程级约束
    status: pending
  - item: "CI必须按candidate head_sha选择唯一push run并核对两个明确matrix jobs"
    source: 流程级约束
    status: pending
  - item: "candidate首次remote mutation前必须有包含OID/refs/non-force/no-Release范围的approved approval-report"
    source: 流程级约束
    status: pending
  - item: "scripts/test、CI、README/CONTRIBUTING、Git refs、CodeStable 状态是挂载点"
    source: 挂载点
    status: pending
  - item: "不使用上游 CI、不建 GitHub Release、不改变批准契约"
    source: 范围守护
    status: pending
  - item: "v0.11.2 与 stable matrix在candidate精确SHA全绿"
    source: 验收场景
    status: pending
  - item: "origin master等于admin，legacy/v0.1.0的remote tag-object和peeled OIDs分别与本地一致"
    source: 验收场景
    status: pending
  - item: "README/license正确表达转载文档不自动适用 Apache"
    source: 验收场景
    status: pending
  - item: "GitHub Release API返回404，candidate..admin只包含.codestable路径"
    source: 验收场景
    status: pending

dod:
  commands:
    - id: CMD-001
      command: "scripts/test --json-evidence .tests/evidence/release-local.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "scripts/audit-license --json .tests/evidence/release-license.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "git diff --check"
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "git fetch origin --prune --no-tags"
      core: true
      failure_handling: fix-or-block
    - id: CMD-005
      command: "git merge-base --is-ancestor origin/master \"$CANDIDATE_OID\""
      core: true
      failure_handling: fix-or-block
    - id: CMD-006
      command: "git fetch origin --prune --no-tags && test \"$(git rev-parse origin/master)\" = \"$CANDIDATE_OID\""
      core: true
      failure_handling: fix-or-block
    - id: CMD-007
      command: "curl -fsSL \"https://api.github.com/repos/ShawnZhongChn/nvim.dot/actions/workflows/ci.yml/runs?head_sha=$CANDIDATE_OID&event=push&per_page=20\" > .tests/evidence/release-runs.json && RUN_ID=\"$(jq -er --arg sha \"$CANDIDATE_OID\" '(.workflow_runs | map(select(.head_sha == $sha and .event == \"push\"))) as $runs | if (($runs | length) == 1 and $runs[0].status == \"completed\" and $runs[0].conclusion == \"success\") then ($runs[0].id | tostring) else error(\"exact-SHA run not uniquely successful\") end' .tests/evidence/release-runs.json)\" && printf '%s\\n' \"$RUN_ID\" > .tests/evidence/release-run-id.txt"
      core: true
      failure_handling: retry-or-block
    - id: CMD-008
      command: "RUN_ID=\"$(cat .tests/evidence/release-run-id.txt)\" && curl -fsSL \"https://api.github.com/repos/ShawnZhongChn/nvim.dot/actions/runs/$RUN_ID/jobs?per_page=100\" | jq -e '[.jobs[] | select(.name == \"test (v0.11.2)\" or .name == \"test (stable)\") | .conclusion] | length == 2 and all(. == \"success\")'"
      core: true
      failure_handling: retry-or-block
    - id: CMD-009
      command: "test \"$(git cat-file -t refs/tags/legacy-nvim-config-2026-07-14)\" = tag && test \"$(git cat-file -t refs/tags/v0.1.0)\" = tag && test \"$(git rev-parse 'refs/tags/v0.1.0^{}')\" = \"$CANDIDATE_OID\" && git for-each-ref --format='%(contents)' refs/tags/v0.1.0 | rg -F '459a4c3b1059671e766a46c7cc223827dc67e3d0' && git for-each-ref --format='%(contents)' refs/tags/v0.1.0 | rg -F '85e5b49e5bf0a4208bd9d1600e1710f4bb6c0e9c' && git for-each-ref --format='%(contents)' refs/tags/v0.1.0 | rg -F 'No GitHub Release'"
      core: true
      failure_handling: fix-or-block
    - id: CMD-010
      command: "test \"$(git ls-remote origin 'refs/tags/legacy-nvim-config-2026-07-14' | cut -f1)\" = \"$(git rev-parse refs/tags/legacy-nvim-config-2026-07-14)\" && test \"$(git ls-remote origin 'refs/tags/legacy-nvim-config-2026-07-14^{}' | cut -f1)\" = \"$(git rev-parse 'refs/tags/legacy-nvim-config-2026-07-14^{}')\" && test \"$(git ls-remote origin 'refs/tags/v0.1.0' | cut -f1)\" = \"$(git rev-parse refs/tags/v0.1.0)\" && test \"$(git ls-remote origin 'refs/tags/v0.1.0^{}' | cut -f1)\" = \"$(git rev-parse 'refs/tags/v0.1.0^{}')\""
      core: true
      failure_handling: fix-or-block
    - id: CMD-011
      command: "test \"$(curl -sS -o /dev/null -w '%{http_code}' https://api.github.com/repos/ShawnZhongChn/nvim.dot/releases/tags/v0.1.0)\" = 404"
      core: true
      failure_handling: retry-or-block
    - id: CMD-012
      command: "ADMIN_OID=\"$(git rev-parse HEAD)\" && git fetch origin --prune --no-tags && test \"$(git rev-parse origin/master)\" = \"$ADMIN_OID\" && git merge-base --is-ancestor \"$CANDIDATE_OID\" \"$ADMIN_OID\" && test -z \"$(git diff --name-only \"$CANDIDATE_OID..$ADMIN_OID\" | rg -v '^\\.codestable/')\""
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, diff_summary, local_evidence, ci_run_jobs, git_objects, remote_oids, github_release_404, approval_report, publish_evidence, final_convergence_evidence]
  cleanliness:
    debug_output: forbidden
