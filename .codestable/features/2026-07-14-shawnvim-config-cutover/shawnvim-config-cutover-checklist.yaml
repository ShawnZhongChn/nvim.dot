feature: 2026-07-14-shawnvim-config-cutover
created: 2026-07-14

steps:
  - action: "Destructive preflight：验证 core evidence、annotated legacy tag/peeled tree/ancestor 和精确 deletion/preserve allowlists"
    exit_signal: "任何 tree mutation 前全部 gate 通过，legacy snapshot 可读且当前 HEAD包含其祖先"
    status: pending
  - action: "Config Shell：建立 init/bootstrap、固定 import order 与空白 user overrides"
    exit_signal: "shell 可加载，shawnvim.plugins 首先导入，user plugins 最后且不含个人行为"
    status: pending
  - action: "State/lock：建立version/install_version=8的shawnvim.json，取消ignore并用隔离data生成lock"
    exit_signal: "两个文件通过error-unmatch；外部可锁定Git specs与lock commits一致，local ShawnVim self-spec按dir/name/lifecycle单独通过"
    status: pending
  - action: "Runtime removal：仅按精确 allowlist删除旧 core/custom/globals/after、kickstart docs、setup scripts和test-k8s"
    exit_signal: "删除集合完整、保留集合零误删，最终 tree/startup trace无旧 module/hook"
    status: pending
  - action: "Clean-room tooling/bootstrap：交付 helpers，把候选 tree复制到临时config并隔离四XDG根，验证首次/二次启动和clone失败"
    exit_signal: "不设置 shawnvim_root；正常启动只拉通用plugins；clone stub在超时内非交互失败；日志/清理策略成立"
    status: pending
  - action: "Health/identity收口：用--real-config保持真实config root并隔离data/state/cache，运行health、spec、module、tree与lock审计"
    exit_signal: "全部核心命令通过，证据记录实际stdpath，真实config与clean-room使用同一入口且用户状态未污染"
    status: pending

checks:
  - item: "Config Shell 只暴露 init/config.lazy/empty overrides"
    source: 名词契约
    status: pending
  - item: "shawnvim.json schema 与 tracked lazy-lock 是状态契约"
    source: 名词契约
    status: pending
  - item: "bootstrap → core → extras → user overrides → startup 顺序固定"
    source: 编排骨架
    status: pending
  - item: "clean-room 必须使用隔离 stdpath，真实入口不得依赖 test override"
    source: 流程级约束
    status: pending
  - item: "任何 destructive mutation 前必须验证 core evidence 和 annotated legacy snapshot"
    source: 流程级约束
    status: pending
  - item: "根 init、override层、state/lock、精确旧 hooks removal和三个验证helpers是挂载点"
    source: 挂载点
    status: pending
  - item: "不迁移旧个人行为、不推送、不创建 release tag"
    source: 范围守护
    status: pending
  - item: "resolved specs 不含 LazyVim/starter，loaded modules 不含旧 core/custom"
    source: 验收场景
    status: pending
  - item: "deterministic clone failure非交互超时退出；真实config health隔离用户状态；外部Git lock/local self-spec分类严格且legacy recovery完整"
    source: 验收场景
    status: pending

dod:
  commands:
    - id: CMD-001
      command: "scripts/test-clean-start --json .tests/evidence/cutover-start.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-002
      command: "scripts/audit-identity --json .tests/evidence/cutover-identity.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-003
      command: "scripts/audit-runtime-tree --json .tests/evidence/cutover-tree.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-004
      command: "scripts/test-clean-start --real-config --json .tests/evidence/cutover-real-health.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-005
      command: "git ls-files --error-unmatch lazy-lock.json && git ls-files --error-unmatch shawnvim.json"
      core: true
      failure_handling: fix-or-block
    - id: CMD-006
      command: "scripts/generate-lock --check-resolved --json .tests/evidence/cutover-lock.json"
      core: true
      failure_handling: fix-or-block
  evidence_required: [command_output, diff_summary, startup_logs, resolved_specs]
  cleanliness:
    debug_output: forbidden
